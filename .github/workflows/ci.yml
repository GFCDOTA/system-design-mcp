name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — tests + build (tsc strict + vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # npm test cobre também a integridade da knowledge-base (kb-integrity),
      # herdada do antigo KnowledgeBaseIntegrityTest do BFF aposentado.
      - name: install + test + build
        working-directory: frontend
        run: |
          npm ci
          npm test
          npm run build

  mcp:
    name: MCP server — build + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp/package-lock.json
      - name: install + build + smoke
        working-directory: mcp
        run: |
          npm ci
          npm run build
          npm run smoke
