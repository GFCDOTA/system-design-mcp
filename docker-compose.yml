# Run the whole Lab with one command: `docker compose up --build`
# frontend (nginx) on :5173 proxies /api -> bff:8080
services:
  bff:
    build:
      context: .
      dockerfile: bff/Dockerfile
    # Host 8080 is often taken on this machine by another Docker stack, so we publish the
    # BFF on 18080. The frontend proxies to "bff:8080" over the compose network regardless,
    # so the UI on :5173 is unaffected; 18080 is just for direct API access (curl).
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - bff
